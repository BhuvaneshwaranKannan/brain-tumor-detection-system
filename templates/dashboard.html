<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand">Brain Tumor Detection Dashboard</span>

<a href="/logout" class="btn btn-danger">Logout</a>

</div>

</nav>


<div class="container mt-5">


<div class="card upload-card">

<h4 class="text-center mb-3">Upload MRI Scan (.nii)</h4>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="file" class="form-control mb-3" required>

<button class="btn btn-primary w-100 analyze-btn">Analyze MRI</button>

</form>

</div>


{% if result %}

<div class="row mt-4">

<div class="col-md-4">

<div class="card result-box">

<h5>Tumor Detection</h5>

<p class="result-text">{{result}}</p>

</div>

</div>


<div class="col-md-4">

<div class="card result-box">

<h5>Tumor Type</h5>

<p class="result-text">{{tumor_type}}</p>

<p>Confidence: {{confidence}}%</p>

</div>

</div>


<div class="col-md-4">

<div class="card result-box">

<h5>Tumor Stage</h5>

<p class="result-text">{{stage}}</p>

</div>

</div>

</div>


<div class="card mt-4 image-card">

<h5 class="text-center">Segmented MRI</h5>

<img src="{{image}}" class="result-image">

</div>

{% endif %}

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
