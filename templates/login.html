<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clinical AI Portal - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-bg">

    <div class="auth-card">
        <div class="auth-logo">
            <i class="fa-solid fa-hospital"></i>
        </div>
        <h2 class="auth-title">Provider Portal</h2>
        <p class="auth-subtitle">Secure Clinical Systems Access</p>

        <form method="POST" id="loginForm">
            <div class="mb-3">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="example@hospital.org" class="form-control" required>
            </div>
            <div class="mb-4">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" class="form-control" required>
            </div>
            {% if error %}
            <div class="alert alert-danger py-2 small mb-3">{{ error }}</div>
            {% endif %}
            <button class="btn btn-primary w-100"><i class="fa-solid fa-lock me-2"></i> Login</button>
        </form>

        <p class="text-center mt-4 mb-0" style="color: var(--text-secondary); font-size: 0.9rem;">
            Not registered? <a href="/register">Create Account</a>
        </p>
    </div>

</body>
</html>
